<!doctype html>

  <style>
    :root{
      --purple:#5b2aa6;
      --purple-dark:#48086f;
      --text:#111;
      --muted:#555;
      --rule:#1a1a1a;
      --bg:#ffffff;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: "Segoe UI", Helvetica, Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    .page{
      display:grid;
      grid-template-columns: 270px 1fr;
      min-height:100vh;
    }

    /* LEFT RAIL */
    .rail{
      background:var(--purple);
      padding:28px 20px;
    }
    .headshot{
      width:100%;
      border-radius:12px;
      border:2px solid rgba(255,255,255,.35);
      display:block;
      margin-bottom:16px;
      background:rgba(255,255,255,.12);
    }
    .iconRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .iconLink{
      width:40px;
      height:40px;
      border-radius:10px;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:white;
      font-weight:800;
      letter-spacing:.02em;
    }
    .rail small{
      color:rgba(255,255,255,.92);
      display:block;
      margin-top:14px;
      line-height:1.35;
      font-weight:600;
    }
    .divider{
      height:2px;
      background:rgba(255,255,255,.35);
      margin:18px 0 10px;
    }

    /* MAIN */
    main{
      padding:34px 40px;
      max-width: 980px;
    }
    header{
      padding-bottom:16px;
      border-bottom:2px solid var(--rule);
      margin-bottom:18px;
    }
    h1{
      margin:0 0 4px;
      font-size:34px;
      letter-spacing:.2px;
    }
    .title{
      margin:0;
      font-size:18px;
      color:var(--muted);
      font-weight:700;
    }
    .download{
      display:inline-block;
      margin-top:12px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #ddd;
      text-decoration:none;
      color:var(--text);
      font-weight:650;
    }
    section{ margin:18px 0 0; }
    h2{
      margin:0 0 8px;
      font-size:14px;
      letter-spacing:.14em;
      color:var(--purple-dark);
      text-transform:uppercase;
    }
    p{ margin:0; line-height:1.5; }
    .role{
      margin-top:10px;
      font-weight:800;
      font-size:16px;
    }
    .meta{
      color:var(--muted);
      font-weight:650;
      margin:2px 0 8px;
    }
    ul{
      margin:8px 0 0 18px;
      padding:0;
    }
    li{ margin:7px 0; line-height:1.4; }
    .cols{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px 26px;
      margin-top:18px;
    }
    .pillList{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:6px;
    }
    .pill{
      border:1px solid #ddd;
      border-radius:999px;
      padding:6px 10px;
      font-size:13px;
      background:#fafafa;
    }

    @media (max-width: 900px){
      .page{ grid-template-columns: 1fr; }
      .rail{ padding:18px 16px; }
      main{ padding:22px 18px; }
      .cols{ grid-template-columns: 1fr; }
    }
  </style>
</head>
